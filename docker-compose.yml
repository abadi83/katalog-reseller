# ── Katalog Reseller — Docker Compose ────────────────────────
version: "3.9"

services:
  app:
    build: .
    container_name: katalog-reseller
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./static/uploads:/app/static/uploads
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Nginx reverse proxy for SSL & custom domain
  nginx:
    image: nginx:alpine
    container_name: katalog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    profiles:
      - production  # Only start with: docker compose --profile production up
